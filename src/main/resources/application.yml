spring:
  application:
    name: payment-integration-service

  datasource:
    url: jdbc:mysql://localhost:3307/payment_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

server:
  port: 8080


  paypal:
    client-id: ${PAYPAL_CLIENT_ID}
    client-secret: ${PAYPAL_CLIENT_SECRET}
    oauth-url: https://api-m.sandbox.paypal.com/v1/oauth2/token
    create-order-url: https://api-m.sandbox.paypal.com/v2/checkout/orders
